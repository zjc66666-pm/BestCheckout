  <script>
    (function () {
      'use strict';
      var guides = {
        'connect-shopify': {
          group:'Getting started', title:'Connect your Shopify store', action:'Open Shopify connection', href:'../?entry=connect-new-shopify-store#/connect-shopify',
          summary:'Create an app in your Shopify Dev Dashboard, then connect it to BestCheckout with its Client ID and Client secret.',
          callout:['Your app stays under your control','BestCheckout does not create or own the Shopify app. You can revoke access whenever you need.'],
          sections:[
            ['Create the Shopify app','In Shopify admin, go to Settings → Apps → App development. Create an app for this store, then open its Settings page.',['Give the app a clear name, such as “BestCheckout connection”.','Keep the app scoped to the Shopify store that will use BestCheckout.']],
            ['Copy the credentials','In the app Settings page, copy the Client ID and Client secret. Keep the secret private; BestCheckout will not show it again after connection.',['Return to Settings → Shopify connection in BestCheckout.','Enter the myshopify.com store address, Client ID and Client secret, then select Connect store.']],
            ['Confirm your store data is ready','After connection, BestCheckout syncs the catalog, discounts, shipping options and customers it needs for checkout.',['Check the sync status before publishing a purchase flow.','Paid BestCheckout orders are written back to Shopify for fulfillment.']]
          ], image:true, related:['payment-services','checkout-domain','first-flow']
        },
        'payment-services': {group:'Getting started',title:'Set up payment services',action:'Open payment services',href:'../#/settings/payments',summary:'Connect the payment services customers can use at checkout, then confirm the right methods appear for the active provider.',sections:[['Choose a card processor','Only one card processor is active at a time. It supplies card fields and supported express wallets.',['Connect or manage the processor in Payment services.','Use the provider dashboard to manage the wallets that are available by device and market.']],['Add independent methods','PayPal Wallet and a direct Klarna account can run alongside the card processor.',['Connect each method with the account that settles its payments.','Review the checkout preview before publishing traffic.']]],related:['connect-shopify','first-flow']},
        'checkout-domain': {group:'Getting started',title:'Set your checkout domain',action:'Open checkout domain',href:'../#/settings/domains',summary:'Use a branded, secure address for Checkout, Upsell, Downsell and Thank you pages while your Shopify storefront keeps its existing domain.',sections:[['Choose the checkout address','Enter the subdomain customers should see after leaving your Shopify storefront.',['Your Shopify storefront URL does not change.','One checkout domain is used throughout the full purchase flow.']],['Add the DNS record','Copy the CNAME record to the provider that manages your domain. BestCheckout detects the record and handles SSL.',['DNS updates can take a few minutes.','Do not send live traffic until the domain shows as connected.']]],related:['connect-shopify','publish-preview']},
        'first-flow': {group:'Getting started',title:'Publish your first purchase flow',action:'Open purchase flows',href:'../#/flows',summary:'Create a focused purchase flow, select the checkout pages customers see and publish only after the connection, payment and domain checks are ready.',sections:[['Start with one clear path','Choose a flow goal, name the draft and select the entry conditions.',['Use the default checkout path for an initial launch.','Add an Upsell or Downsell only when it supports the flow goal.']],['Review before publishing','Preview the path, confirm the selected checkout page and review the entry conditions.',['Publishing sends eligible traffic to BestCheckout.','Customers who are not eligible continue to Shopify Checkout.']]],related:['create-flow','connect-shopify','payment-services']},
        'create-flow': {group:'Purchase flows',title:'Create a purchase flow',action:'Open purchase flows',href:'../#/flows',summary:'A purchase flow defines the customer journey from a BestCheckout checkout page through any eligible post-purchase pages.',sections:[['Choose the goal and path','Start from the path that matches the campaign: checkout only, checkout with Upsell, or checkout with Upsell and Downsell.',['The selected path keeps the page sequence simple and predictable.','Checkout and Thank you remain part of every complete journey.']],['Name the draft','Use a name your team can recognize in orders, activity and performance reporting.',['A draft never changes live customer traffic.','Configure entry conditions after the flow is created.']]],related:['customer-entry','checkout-pages','publish-preview']},
        'customer-entry': {group:'Purchase flows',title:'Customer entry and eligibility',action:'Configure a flow',href:'../#/flows',summary:'Control which carts and recognized Shopify customers can enter a purchase flow. Every condition must match before the customer is eligible.',sections:[['Start with cart or storefront conditions','Use cart total, products, discount code, market or language to create a relevant entry rule.',['Keep the first version focused on one business purpose.','Use AND conditions only when each condition is essential.']],['Use customer conditions carefully','Customer tags, purchase history and spend work only for recognized Shopify customers.',['Customers who do not match continue to Shopify Checkout.','Avoid adding conditions that accidentally exclude most traffic.']]],related:['traffic-allocation','publish-preview']},
        'traffic-allocation': {group:'Purchase flows',title:'Traffic allocation',action:'Open purchase flows',href:'../#/flows',summary:'Allocate traffic only when a purchase flow contains more than one BestCheckout checkout page. It does not route traffic to Shopify Checkout.',sections:[['Add another checkout page','Create a second BestCheckout checkout page inside the flow when you need to compare page variants.',['The checkout pages must add up to 100% of eligible flow traffic.','Shopify Checkout remains the fallback for customers outside the flow.']],['Review allocation before publishing','Use a clear percentage for each BestCheckout checkout page and review the preview path.',['Start with an even split for a simple comparison.','Change traffic only after you have enough purchase data.']]],related:['checkout-pages','overview']},
        'publish-preview': {group:'Purchase flows',title:'Publish, pause and preview',action:'Open purchase flows',href:'../#/flows',summary:'Preview a purchase flow before customers see it, then publish or pause it from the flow detail page.',sections:[['Preview the complete path','Preview Checkout, Upsell, Downsell and Thank you in the order customers will see them.',['A preview is safe and does not send live traffic.','Confirm the selected templates and product offers.']],['Manage live status','Publish when the path and entry rules are ready. Pause when you need to stop new BestCheckout traffic.',['Pausing never removes the flow configuration.','Shopify Checkout stays available as the fallback.']]],related:['first-flow','activity-log']},
        'checkout-pages': {group:'Checkout pages',title:'Manage checkout pages',action:'Open checkout pages',href:'../#/pages',summary:'Create and manage reusable Checkout and Thank you page assets, then choose them in the purchase flows that should use them.',sections:[['Create a reusable page','Start with the page type your flow requires and name it for the campaign or audience.',['Changes remain in draft until you publish the purchase flow.','Use the same checkout page in multiple flows when the experience is shared.']],['Customize with confidence','Open the page editor to make changes and preview the customer-facing result.',['Keep checkout information clear and reduce unnecessary fields.','Use a Thank you page to confirm the order and guide the next action.']]],related:['offers','thank-you','create-flow']},
        'offers': {group:'Checkout pages',title:'Configure Upsell and Downsell',action:'Open purchase flows',href:'../#/flows',summary:'Configure the product and discount for the existing Upsell or Downsell step in a purchase flow.',sections:[['Select the product first','Choose the product or variant before setting its offer price. The selected item stays empty until your team chooses it.',['Use a percentage or fixed-amount discount.','BestCheckout calculates and shows the customer price from that discount.']],['Keep the offer relevant','An Upsell follows a successful checkout; a Downsell gives a lower-priced alternative after an Upsell is declined.',['Do not use an offer just to fill the path.','Create the flow type that matches the journey you need.']]],related:['checkout-pages','first-flow']},
        'thank-you': {group:'Checkout pages',title:'Thank you page',action:'Open checkout pages',href:'../#/pages',summary:'The Thank you page confirms the completed purchase and can continue the customer experience after payment.',sections:[['Confirm the order clearly','Use the page to reassure customers that payment succeeded and their Shopify order is being created.',['Keep the primary order confirmation message visible.','Avoid changing fulfillment expectations here.']],['Use the page consistently','Select the page in the relevant purchase flow and publish the flow when the content is ready.',['The Thank you page is part of the completed path.','Preview the full journey after editing.']]],related:['checkout-pages','orders']},
        'orders': {group:'Orders and Shopify sync',title:'BestCheckout orders',action:'Open orders',href:'../#/orders',summary:'The Orders list shows paid orders captured through BestCheckout. Native Shopify orders and abandoned checkouts remain in Shopify.',sections:[['Understand what appears here','A BestCheckout order appears after payment succeeds. It is then sent to Shopify so your usual fulfillment process can continue.',['Use the order detail page for the payment and sync context.','Use the Shopify order for fulfillment and refunds.']],['Filter the order list','Filter paid BestCheckout orders by key fields, date and total range to find the record you need.',['Open the order detail from the row or the eye action.','Check Shopify sync status before taking action.']]],related:['sync-status','fulfillment']},
        'sync-status': {group:'Orders and Shopify sync',title:'Shopify sync status',action:'Open orders',href:'../#/orders',summary:'Shopify sync status explains whether a paid BestCheckout order is ready for your Shopify fulfillment workflow.',sections:[['In Shopify','The order was created successfully in Shopify and can follow your normal fulfillment process.',['Use View in Shopify when you need the Shopify record.']],['Needs attention','BestCheckout could not create the Shopify order yet. Review the order and Shopify connection before retrying.',['Do not treat this as a payment failure.','Activity log records important connection and sync events.']]],related:['orders','connection-sync','activity-log']},
        'fulfillment': {group:'Orders and Shopify sync',title:'Fulfillment in Shopify',action:'Open orders',href:'../#/orders',summary:'BestCheckout captures payment and writes the paid order back to Shopify. Shopify remains the fulfillment workspace for your team.',sections:[['Wait for the Shopify order','Complete fulfillment only after the order sync shows In Shopify or Created in Shopify.',['Inventory and fulfillment apps continue to use Shopify as the source of truth.']],['Handle post-purchase work in Shopify','Ship, refund and communicate with the customer from Shopify after the order is created.',['BestCheckout keeps the checkout and sync context visible in its order detail.']]],related:['orders','sync-status']},
        'connection-sync': {group:'Settings and team',title:'Shopify connection and data sync',action:'Open Shopify connection',href:'../#/settings/base',summary:'Review the connected store and the catalog, discount, shipping and customer data that BestCheckout uses for checkout.',sections:[['Check connection health','The Shopify connection page shows the store, domain and data sync status.',['Sync products and variants before configuring offers.','Sync discounts and shipping options before publishing checkout traffic.']],['Review before changing access','Use Manage connection only when you need to refresh access, replace the custom app or intentionally disconnect the store.',['Disconnecting stops routing, sync and order write-back.']]],related:['connect-shopify','sync-status']},
        'email-notifications': {group:'Settings and team',title:'Email notifications',action:'Open email notifications',href:'../#/settings/notifications',summary:'Review the emails BestCheckout sends so customers receive a clear record of their completed purchase.',sections:[['Review the sender details','Use sender information customers recognize and can reply to.',['Keep the sender aligned with the connected store brand.']],['Keep messages transactional','Use order and payment notifications to set clear expectations.',['Edit checkout pages separately when you need to change the customer journey.']]],related:['thank-you','orders']},
        'roles': {group:'Settings and team',title:'Roles and permissions',action:'Open roles',href:'../#/settings/roles',summary:'Create roles that give each teammate only the permissions they need in BestCheckout.',sections:[['Create roles around responsibilities','Use clear role names such as Order Specialist or Campaign Manager.',['Assign only the modules each role needs.','Review role membership before deleting a role.']],['Maintain access over time','Update permissions as responsibilities change.',['A role that is in use cannot be deleted until team assignments are changed.']]],related:['staff']},
        'staff': {group:'Settings and team',title:'Staff management',action:'Open staff',href:'../#/settings/staff',summary:'Invite, review and manage team members who need access to the BestCheckout merchant account.',sections:[['Invite the right teammate','Add a staff member with their email address and the appropriate role.',['Use the access code flow only for the team members you intend to onboard.']],['Review account status','The Staff list shows active, inactive, invite-pending and access-review states.',['Keep the account list current when team responsibilities change.']]],related:['roles']},
        'overview': {group:'Reports and activity',title:'Overview and performance',action:'Open overview',href:'../#/home',summary:'Use Overview to review launch readiness, completed checkout sales, purchase-flow performance and the next operational priority.',sections:[['Review the launch checklist','Complete connection, payment, domain and purchase-flow setup before relying on live traffic.',['Use the checklist to find the next action, not just to view status.']],['Compare purchase-flow results','Review completed orders, conversion, average order value and sales for live flows.',['Use the results to decide whether to keep a flow running or create a focused follow-up test.']]],related:['activity-log','first-flow']},
        'activity-log': {group:'Reports and activity',title:'Activity log',action:'Open activity log',href:'../#/activity',summary:'Activity log records the meaningful changes to your BestCheckout setup, including flows, pages, payment services, orders and Shopify sync events.',sections:[['Find the event you need','Filter by activity type, status, search term and event time. Active filters can be removed one at a time.',['Use the same filter pattern as the Orders list for a consistent workflow.']],['Use events to understand changes','Review published flows, checkout-page changes and Shopify write-back events before troubleshooting.',['The log is an audit trail for meaningful merchant-facing activity.']]],related:['sync-status','publish-preview']}
      };

      guides['connect-shopify'] = {
        group:'Getting started', title:'Connect your Shopify store', action:'Open Shopify connection', href:'../?entry=connect-new-shopify-store#/connect-shopify',
        summary:'Create and release a Shopify Dev Dashboard app, copy its Client ID and Client secret, then connect the same Shopify store to BestCheckout.',
        callout:['You only need three values at the end','Your <b>myshopify.com</b> store address, Client ID, and Client secret. The app remains in your Shopify organization and can be rotated or revoked by your team.'],
        image:false,
        sections:[
          ['Before you start','Use a secure device and make sure you can access this Shopify store’s admin. To use Dev Dashboard, your Shopify organization needs to grant you app-development access.',['You will enter <code>your-store.myshopify.com</code> later — not your customer-facing storefront domain and not a URL beginning with <code>https://</code>.','Never paste a Client secret into chat, email, a spreadsheet, or source code.']],
          ['1. Open App development in Shopify admin','In Shopify admin, go to <b>Settings</b> &rarr; <b>Apps</b>. Select <b>Develop apps</b> (it can also appear as <b>App development</b>), then choose the option to build and manage apps in Dev Dashboard.',['If you cannot see Develop apps, ask the store owner or organization administrator to grant the Shopify <b>App developer</b> role.','Use the Shopify store that will connect to BestCheckout; do not create the app in a different store or organization.'],null,'<div class="guide-path"><b>Shopify admin</b><span>→</span><b>Settings</b><span>→</span><b>Apps</b><span>→</span><b>Develop apps</b><span>→</span><b>Dev Dashboard</b></div>'],
          ['2. Create the Dev Dashboard app','In Dev Dashboard, open <b>Apps</b> in the left sidebar and select <b>Create app</b>. Choose <b>Start from Dev Dashboard</b>, enter a recognizable name such as <b>BestCheckout connection</b>, then select <b>Create</b>.',['You do not need the Shopify CLI option for this credential-only connection flow.','The app name is only for your team. It does not appear to customers at checkout.'],null,'<div class="guide-note"><b>Why this route?</b> Shopify positions Dev Dashboard for API and automation integrations. Your app stays merchant-owned while BestCheckout uses its credentials only to connect the store.</div>'],
          ['3. Create and release the first version','Open <b>Versions</b> for the new app and create the initial version. Complete the fields Shopify requires, then select <b>Release</b> and confirm the release dialog. A released version makes the app ready for the next connection step.',['For a credential-only setup, do not add unrelated API permissions. If BestCheckout later asks for a scope list, add only that list in a new version.','Leave <b>Use legacy install flow</b> off unless your Shopify implementation specifically requires it.','A version name and message are optional in the Shopify release dialog.'],null,'<div class="guide-config"><div><strong>App URL</strong><span>If Shopify requires a value, use the safe placeholder <code>https://example.com</code>. Do not enter your storefront or <code>myshopify.com</code> address here.</span></div><div><strong>Redirect URLs</strong><span>Leave blank for this credential-only setup unless Shopify or your implementation explicitly provides a redirect URL.</span></div><div><strong>API access</strong><span>Keep the permissions minimal. Product, customer, discount, shipping, and order access are configured only when your BestCheckout setup requests them.</span></div></div>'],
          ['4. Copy the Client ID and Client secret','Open <b>Apps</b>, choose your app, then open <b>Settings</b>. In the <b>Credentials</b> card, use the copy buttons beside <b>Client ID</b> and <b>Secret</b>. These are the only credentials you need to enter in BestCheckout.',['Treat the secret like a password. Do not reveal it on screen recordings or share it with anyone outside the authorized setup team.','If you think the secret was exposed, use <b>Rotate</b> in Shopify immediately, then replace the value in BestCheckout.'],{src:'assets/shopify-dev-dashboard-credentials-redacted.png',alt:'Shopify Dev Dashboard Settings page with the Client ID and Secret fields safely redacted',caption:'Apps → your app → Settings → Credentials. This example is cropped and all account, email, Client ID, and secret values are redacted.',className:'guide-screenshot--credentials'}],
          ['5. Connect the same store in BestCheckout','Return to BestCheckout. Enter the permanent Shopify address, Client ID, and Client secret, then select <b>Connect store</b>. BestCheckout verifies the connection before any checkout traffic can be published.',['Store address format: <code>your-store.myshopify.com</code>. Do not use a custom domain such as <code>www.yourstore.com</code>.','If verification fails, first confirm that the Client ID and secret came from the same released Shopify app and the same Shopify organization.']],
          ['Official Shopify references','Shopify occasionally updates labels in Dev Dashboard. Use these official guides if your screen differs from the example.',['The BestCheckout steps above follow Shopify’s current Dev Dashboard creation and credential guidance.'],null,'<div class="guide-resource-list"><a href="https://shopify.dev/docs/apps/build/dev-dashboard/create-apps-using-dev-dashboard" target="_blank" rel="noopener">Create apps using Dev Dashboard</a><a href="https://shopify.dev/docs/apps/build/dev-dashboard/get-api-access-tokens?lang=node" target="_blank" rel="noopener">Find Client ID and Client secret</a><a href="https://shopify.dev/docs/apps/build/authentication-authorization/client-secrets" target="_blank" rel="noopener">Keep client credentials secure</a></div>']
        ], related:['payment-services','checkout-domain','first-flow']
      };

      var article = document.querySelector('[data-guide-article]');
      var breadcrumbs = document.querySelector('[data-breadcrumbs]');
      var toc = document.querySelector('[data-article-toc]');
      var sidebar = document.querySelector('[data-help-sidebar]');
      var mobileToggle = document.querySelector('[data-mobile-tree]');
      var search = document.querySelector('[data-guide-search]');
      var activeKey = '';

      function guideLabel(key) { return guides[key] ? guides[key].title : ''; }
      function sectionHtml(section, index, showImage) {
        var bullets = section[2] && section[2].length ? '<ul class="guide-list">' + section[2].map(function (item) { return '<li>' + item + '</li>'; }).join('') + '</ul>' : '';
        var image = showImage && index === 1 ? '<figure class="guide-screenshot"><img src="assets/shopify-dev-dashboard-credentials-redacted.png" alt="Shopify Dev Dashboard credentials example with sensitive values redacted" /><figcaption>Shopify Dev Dashboard → your app → Settings. Credentials are redacted in this example.</figcaption></figure>' : '';
        return '<section class="guide-section" id="section-' + (index + 1) + '"><h2>' + section[0] + '</h2><p>' + section[1] + '</p>' + bullets + image + '</section>';
      }
      function richSectionHtml(section, index, showImage) {
        var bullets = section[2] && section[2].length ? '<ul class="guide-list guide-security-list">' + section[2].map(function (item) { return '<li>' + item + '</li>'; }).join('') + '</ul>' : '';
        var media = section[3] || (showImage && index === 1 ? {src:'assets/shopify-dev-dashboard-credentials-redacted.png',alt:'Shopify Dev Dashboard credentials example with sensitive values redacted',caption:'Shopify Dev Dashboard → your app → Settings. Credentials are redacted in this example.'} : null);
        var image = media ? '<figure class="guide-screenshot ' + (media.className || '') + '"><img src="' + media.src + '" alt="' + media.alt + '" /><figcaption>' + media.caption + '</figcaption></figure>' : '';
        var extra = section[4] || '';
        return '<section class="guide-section" id="section-' + (index + 1) + '"><h2>' + section[0] + '</h2><p>' + section[1] + '</p>' + extra + bullets + image + '</section>';
      }
      function relatedHtml(keys) {
        if (!keys || !keys.length) return '';
        return '<aside class="related-guides"><h2>Related guides</h2>' + keys.map(function (key) { return '<a href="#guide=' + key + '" data-related-guide="' + key + '">→ ' + guideLabel(key) + '</a>'; }).join('') + '</aside>';
      }
      function renderGuide(key, updateHash) {
        var guide = guides[key] || guides['connect-shopify'];
        activeKey = guides[key] ? key : 'connect-shopify';
        breadcrumbs.innerHTML = '<span class="breadcrumb-label">Help center</span><span class="breadcrumb-separator" aria-hidden="true">›</span><span class="breadcrumb-label">' + guide.group + '</span><span class="breadcrumb-separator" aria-hidden="true">›</span><b>' + guide.title + '</b>';
        article.innerHTML = '<header class="article-head"><div class="article-kicker">' + guide.group + '</div><h1>' + guide.title + '</h1><p class="article-summary">' + guide.summary + '</p></header>' +
          (guide.callout ? '<div class="guide-callout"><i>i</i><div><strong>' + guide.callout[0] + '</strong>' + guide.callout[1] + '</div></div>' : '') +
          guide.sections.map(function (section, index) { return richSectionHtml(section, index, guide.image); }).join('') + relatedHtml(guide.related);
        toc.innerHTML = guide.sections.map(function (section, index) { return '<a href="#section-' + (index + 1) + '"' + (index === 0 ? ' class="active"' : '') + '>' + section[0] + '</a>'; }).join('');
        document.querySelectorAll('[data-guide]').forEach(function (button) { var on = button.getAttribute('data-guide') === activeKey; button.classList.toggle('active', on); if (on) { var branch = button.closest('.tree-children'); var group = button.closest('[data-tree-group]').querySelector('[data-tree-toggle]'); branch.hidden = false; group.setAttribute('aria-expanded', 'true'); } });
        document.querySelectorAll('[data-related-guide]').forEach(function (link) { link.onclick = function (event) { event.preventDefault(); renderGuide(link.getAttribute('data-related-guide'), true); }; });
        if (updateHash) history.replaceState(null, '', '#guide=' + activeKey);
        if (window.innerWidth <= 760) { sidebar.classList.remove('is-open'); mobileToggle.setAttribute('aria-expanded', 'false'); }
      }
      function filterTree(value) {
        var query = value.trim().toLowerCase();
        var any = false;
        document.querySelectorAll('[data-tree-group]').forEach(function (group) {
          var visible = 0;
          group.querySelectorAll('[data-guide]').forEach(function (item) { var match = !query || item.textContent.toLowerCase().indexOf(query) >= 0; item.hidden = !match; if (match) visible += 1; });
          group.hidden = visible === 0;
          if (query && visible) { group.querySelector('.tree-children').hidden = false; group.querySelector('[data-tree-toggle]').setAttribute('aria-expanded', 'true'); }
          if (visible) any = true;
        });
        document.querySelector('[data-tree-empty]').hidden = any;
        if (query && any && window.innerWidth <= 760) { sidebar.classList.add('is-open'); mobileToggle.setAttribute('aria-expanded', 'true'); }
      }
      document.querySelectorAll('[data-tree-toggle]').forEach(function (toggle) { toggle.onclick = function () { var children = toggle.parentElement.querySelector('.tree-children'); var open = toggle.getAttribute('aria-expanded') === 'true'; toggle.setAttribute('aria-expanded', String(!open)); children.hidden = open; }; });
      document.querySelectorAll('[data-guide]').forEach(function (button) { button.onclick = function () { renderGuide(button.getAttribute('data-guide'), true); }; });
      mobileToggle.onclick = function () { var open = sidebar.classList.toggle('is-open'); mobileToggle.setAttribute('aria-expanded', String(open)); };
      search.oninput = function () { filterTree(search.value); };
      window.addEventListener('hashchange', function () { var match = location.hash.match(/^#guide=([\w-]+)/); if (match) renderGuide(match[1], false); });
      var initial = location.hash.match(/^#guide=([\w-]+)/);
      renderGuide(initial ? initial[1] : 'connect-shopify', false);
    }());
  </script>
</body>
