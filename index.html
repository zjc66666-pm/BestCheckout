<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BestCheckout | Checkout growth for Shopify brands</title>
  <link rel="icon" href="assets/brand-mark.svg" type="image/svg+xml" />
  <script>
    (function () {
      var publicRoutes = ['landing', 'sign-in', 'sign-up', 'forgot-password', 'connect-shopify', 'help'];
      var legacySections = { '#product': 'product', '#results': 'results', '#how-it-works': 'how-it-works' };

      function routeName(hash) {
        return (hash || '').replace(/^#\/?/, '').split(/[/?]/)[0];
      }

      function sendLegacyAdminRouteToApp() {
        var hash = window.location.hash;
        if (publicRoutes.indexOf(routeName(hash)) !== -1) return;
        window.location.replace('app/' + window.location.search + hash);
      }

      var initialHash = window.location.hash;
      var legacySection = legacySections[initialHash];
      if (!initialHash || initialHash === '#/' || legacySection) {
        var search = window.location.search;
        var revision = 'rev=20260724rootwebsite1';
        if (search.indexOf(revision) < 0) search += (search ? '&' : '?') + revision;
        window.location.replace(window.location.pathname + search + '#/landing' + (legacySection ? '?section=' + legacySection : ''));
        return;
      }

      sendLegacyAdminRouteToApp();
      window.addEventListener('hashchange', sendLegacyAdminRouteToApp);
    }());
  </script>
